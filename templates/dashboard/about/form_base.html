{% extends "dashboard_base.html" %}

{% block dashboard_content %}
<div class="p-6">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow border border-gray-100 p-8">
        <h1 class="text-2xl font-bold text-[#5c0d0d] mb-6">{{ title }}</h1>

        <form method="post" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            {% for field in form %}
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-red-600 text-sm mt-1">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}

            <div class="flex gap-3 pt-4">
                <button type="submit" class="px-5 py-2.5 bg-[#800000] text-white rounded-xl hover:bg-[#5c0d0d]">
                    Save
                </button>
                <a href="{% url 'mainapp:about_dashboard' %}" class="px-5 py-2.5 bg-gray-200 text-gray-800 rounded-xl hover:bg-gray-300">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
