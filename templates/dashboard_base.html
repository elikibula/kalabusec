{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gray-50" x-data="{ sidebarOpen: false, sidebarMini: false }">
  <div class="min-h-screen">

    <!-- Mobile overlay -->
    <div
      x-show="sidebarOpen"
      x-transition.opacity
      class="fixed inset-0 bg-black/40 z-40 lg:hidden"
      @click="sidebarOpen = false">
    </div>

    <!-- Sidebar -->
    <aside
      :class="[
        sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0',
        sidebarMini ? 'lg:w-20' : 'lg:w-64'
      ]"
      class="fixed top-16 left-0 z-50 h-[calc(100vh-4rem)] w-64 bg-white border-r border-gray-200 overflow-y-auto transform transition-all duration-300">

      {% include "partials/sidebar.html" %}
    </aside>

    <!-- Main content -->
    <div
      :class="sidebarMini ? 'lg:ml-20' : 'lg:ml-64'"
      class="min-h-screen transition-all duration-300">

      <div class="px-4 sm:px-6 lg:px-8 py-2">

        <!-- Top toolbar -->
        <div class="sticky top-0 z-30 bg-gray-50/95 backdrop-blur-sm pb-2">
          <div class="flex items-center justify-between rounded-xl border border-gray-200 bg-white px-3 py-2 shadow-sm">
            <div class="flex items-center gap-2">
              <button
                @click="sidebarOpen = true"
                class="lg:hidden inline-flex items-center justify-center rounded-lg p-2 text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
              </button>

              <button
                @click="sidebarMini = !sidebarMini"
                class="hidden lg:inline-flex items-center justify-center rounded-lg p-2 text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition"
                :title="sidebarMini ? 'Expand sidebar' : 'Collapse sidebar'">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5l-7 7 7 7M20 5l-7 7 7 7"/>
                </svg>
              </button>

              <span class="hidden sm:block text-sm font-medium text-gray-700">
                {{ request.user.get_full_name|default:request.user.username }} Strive to attain excellence
              </span>
            </div>
          </div>
        </div>

        {% include "partials/course_context_bar.html" %}

        <main id="dashboard-main-content" class="mt-2">
          {% block dashboard_content %}{% endblock %}
        </main>
      </div>
    </div>

  </div>
</div>
{% endblock %}
