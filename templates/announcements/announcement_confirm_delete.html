{% extends 'dashboard_base.html' %}
{% block title %}Delete announcement - Kalabu Secondary School{% endblock %}
{% block dashboard_content %}
<div class="max-w-lg mx-auto">
  <div class="bg-white border border-red-200 rounded-xl p-6 text-center">
    <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg width="22" height="22" fill="none" stroke="#DC2626" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </div>
    <h1 class="text-lg font-semibold text-gray-900 mb-2">Delete "{{ object.title }}"?</h1>
    <p class="text-sm text-gray-500 mb-6">This announcement will be permanently removed.</p>
    <form method="post" class="flex justify-center gap-3">
      {% csrf_token %}
      <a href="{% url 'announcements:list' %}" class="px-4 py-2 text-sm border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50">Cancel</a>
      <button type="submit" class="px-4 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700 font-medium">Delete</button>
    </form>
  </div>
</div>
{% endblock %}
